<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>编辑台 — Make Your Pages</title>
<style>
:root{--bg:#f8f6f3;--card:#fffefa;--border:#ddd5cb;--text:#2c2420;--text2:#6b5e54;--text3:#9a8d82;--accent:#8b5e3c;--accent2:#b07a50;--accent-bg:#f5efe8;--code-bg:#1e1e2e;--code-text:#cdd6f4;--font:'Inter','Noto Sans SC',sans-serif;--mono:'JetBrains Mono','Fira Code',monospace}*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.6}.container{max-width:1100px;margin:0 auto;padding:20px}.top-bar{display:flex;align-items:center;gap:12px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}.top-bar h1{font-size:17px;font-weight:600}.top-bar label{font-size:11px;color:var(--text3);margin-right:4px}.top-bar select{font-size:12px;padding:4px 8px;border:1px solid var(--border);background:var(--card);border-radius:4px;font-family:var(--font)}.top-bar .note{font-size:11px;color:var(--text3);margin-left:auto}.toolbar{display:flex;flex-wrap:wrap;gap:3px;padding:6px 10px;background:var(--card);border:1px solid var(--border);border-radius:6px;margin-bottom:8px;align-items:center}.toolbar .sep{width:1px;height:18px;background:var(--border);margin:0 4px}.toolbar .lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin:0 2px}.toolbar button{background:none;border:1px solid transparent;padding:4px 9px;font-size:11px;color:var(--text2);cursor:pointer;border-radius:3px;font-family:var(--font);white-space:nowrap;transition:all .12s}.toolbar button:hover{background:var(--accent-bg);color:var(--accent);border-color:var(--border)}.editor-wrap{display:flex;gap:10px;min-height:520px}.pane{flex:1;border:1px solid var(--border);border-radius:6px;overflow:hidden;background:var(--card);display:flex;flex-direction:column}.pane-title{font-size:10px;color:var(--text3);padding:5px 10px;background:#f5f2ee;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:0.5px;font-weight:600;display:flex;justify-content:space-between}.pane-title .mode-badge{font-size:9px;background:var(--accent);color:#fff;padding:1px 6px;border-radius:3px;font-weight:400}.pane textarea{flex:1;border:none;padding:14px;font-family:var(--mono);font-size:12.5px;line-height:1.65;resize:none;outline:none;background:var(--card);color:var(--text);width:100%}.preview-body{padding:18px;overflow-y:auto;flex:1;background:#fff}.preview-body h1{font-size:22px;margin:14px 0 6px;border-bottom:1px solid #eee;padding-bottom:5px}.preview-body h2{font-size:18px;margin:16px 0 6px;border-bottom:1px solid #eee;padding-bottom:4px}.preview-body h3{font-size:15px;margin:14px 0 4px}.preview-body p{margin-bottom:10px}.preview-body code{background:#f0ede8;color:var(--accent);padding:1px 5px;border-radius:3px;font-family:var(--mono);font-size:11px}.preview-body pre{background:var(--code-bg);color:var(--code-text);padding:14px;border-radius:6px;overflow-x:auto;font-family:var(--mono);font-size:11px;line-height:1.55;margin:10px 0}.preview-body pre code{background:none;color:inherit;padding:0}.preview-body blockquote{border-left:3px solid var(--accent);padding:6px 14px;margin:10px 0;color:var(--text2);background:var(--accent-bg)}.preview-body table{border-collapse:collapse;width:100%;margin:10px 0;font-size:12px}.preview-body th{background:var(--accent-bg);border-bottom:2px solid var(--accent);padding:6px 10px;text-align:left;font-weight:600}.preview-body td{border-bottom:1px solid #eee;padding:6px 10px}.preview-body a{color:var(--accent)}.preview-body ul,.preview-body ol{margin:6px 0 14px 22px}.preview-body li{margin:3px 0}.callout{border-radius:6px;padding:10px 14px;margin:10px 0;border-left:4px solid #8b5e3c;background:#f5efe8;font-size:12px}.callout .callout-title{font-weight:600;margin-bottom:3px;font-size:12px}.callout.note{border-left-color:#448aff;background:#eef3ff}.callout.note .callout-title{color:#448aff}.callout.warning{border-left-color:#e6a700;background:#fffbed}.callout.warning .callout-title{color:#b8860b}.callout.tip{border-left-color:#00a86b;background:#eefaf3}.callout.tip .callout-title{color:#008055}.callout.danger{border-left-color:#d32f2f;background:#fff0f0}.callout.danger .callout-title{color:#b71c1c}.callout.info{border-left-color:#6d4cbf;background:#f5f0ff}.callout.info .callout-title{color:#5e35b1}.actions{display:flex;gap:8px;margin-top:10px;align-items:center}.actions button{padding:7px 18px;font-size:12px;cursor:pointer;border-radius:4px;font-family:var(--font);font-weight:600;transition:all .12s}.btn-primary{background:var(--accent);color:#fff;border:none}.btn-primary:hover{background:var(--accent2)}.btn-secondary{background:var(--card);color:var(--accent);border:1px solid var(--accent)}.btn-secondary:hover{background:var(--accent-bg)}.status{font-size:11px;color:var(--text3);margin-left:auto}@media(max-width:768px){.editor-wrap{flex-direction:column}.pane{min-height:280px}}
</style></head><body><div class="container">
<div class="top-bar"><a href="index.html" style="font-size:12px;color:var(--text3)">← 目录</a><h1>⚡ 编辑台</h1><label>编辑模式：</label><select id="mode" onchange="switchMode()"><option value="md">📝 Markdown（写教程文字）</option><option value="html">🌐 HTML（写/改 Playground 代码）</option></select><span class="note">改完 → 预览 → 复制 → 贴到对应页面文件里</span></div>
<div class="toolbar" id="tb-md"><span class="lbl">标题</span><button onclick="insertAt('md','# ','一级标题\n')">H1</button><button onclick="insertAt('md','## ','二级标题\n')">H2</button><button onclick="insertAt('md','### ','三级标题\n')">H3</button><span class="sep"></span><span class="lbl">文字</span><button onclick="wrapSel('md','**','**','加粗')"><b>B</b></button><button onclick="wrapSel('md','*','*','斜体')"><i>I</i></button><button onclick="wrapSel('md','`','`','代码')">&lt;/&gt;</button><span class="sep"></span><span class="lbl">元素</span><button onclick="wrapSel('md','[','](https://...)','链接')">🔗</button><button onclick="wrapSel('md','![','](url)','图片')">🖼</button><button onclick="insertAt('md','- ','列表项\n- 第二项\n')">📋</button><button onclick="insertAt('md','| A | B | C |\n|---|---|---|\n| x | y | z |\n')">📊</button><button onclick="insertAt('md','\n---\n','')">—</button><span class="sep"></span><span class="lbl">Callout</span><button onclick="insertAt('md','> [!note] ','标题\n> 内容\n')" style="color:#448aff">note</button><button onclick="insertAt('md','> [!warning] ','注意\n> 内容\n')" style="color:#b8860b">warn</button><button onclick="insertAt('md','> [!tip] ','技巧\n> 内容\n')" style="color:#008055">tip</button><button onclick="insertAt('md','> [!info] ','信息\n> 内容\n')" style="color:#5e35b1">info</button><button onclick="insertAt('md','> [!danger] ','危险\n> 内容\n')" style="color:#b71c1c">danger</button></div>
<div class="toolbar" id="tb-html" style="display:none"><span class="lbl">标签</span><button onclick="wrapSel('html','<h1>','</h1>','标题')">h1</button><button onclick="wrapSel('html','<h2>','</h2>','标题')">h2</button><button onclick="wrapSel('html','<p>','</p>','段落')">p</button><span class="sep"></span><button onclick="wrapSel('html','<b>','</b>','粗体')"><b>B</b></button><button onclick="wrapSel('html','<code>','</code>','代码')">&lt;/&gt;</button><button onclick="wrapSel('html','<a href="#">','</a>','链接')">🔗</button><button onclick="insertAt('html','<img src="" alt="">','')">🖼</button><span class="sep"></span><button onclick="insertAt('html','<ul>\n  <li></li>\n  <li></li>\n</ul>\n','')">📋</button><button onclick="insertAt('html','<table>\n<tr><th>A</th><th>B</th></tr>\n<tr><td>x</td><td>y</td></tr>\n</table>\n','')">📊</button><button onclick="insertAt('html','<hr>\n','')">—</button><span class="sep"></span><span class="lbl">Playground</span><button onclick="insertAt('html','<div class="playground" id="pg-N">\n  <div class="playground-header">\n    <div class="playground-header-dots"><span style="background:#ff5f56"></span><span style="background:#ffbd2e"></span><span style="background:#27c93f"></span></div>\n    <span class="title">标题</span>\n    <button class="playground-run" onclick="runPlayground(\'pg-N\')">▶ 运行</button>\n  </div>\n  <div class="playground-body">\n    <div class="playground-code">\n      <textarea id="pg-N-code">&lt;h1&gt;Hello&lt;/h1&gt;</textarea>\n    </div>\n    <div class="playground-preview"><iframe id="pg-N-frame"></iframe></div>\n  </div>\n</div>\n','')">🧪 新Playground</button></div>
<div class="editor-wrap"><div class="pane"><div class="pane-title"><span>✏️ 编辑</span><span class="mode-badge" id="mode-badge">Markdown</span></div><textarea id="source" placeholder="在这里写内容..."># 欢迎使用编辑台

## 这是什么？
一个**不用学语法**的编辑工具。

## Callout 示例

> [!note] 备注框
> 用来补充说明，适合放OC设定备注。

> [!warning] 注意
> Callout 是 Obsidian 的特色功能。

> [!tip] 小技巧
> 用工具栏按钮快速插入，不用记语法。

| 角色 | 职位 | 等级 |
|------|------|------|
| 灯儿 | 首席研究员 | S级 |
| 你的OC | — | — |</textarea></div><div class="pane"><div class="pane-title">👁 预览</div><div class="preview-body" id="preview"></div></div></div>
<div class="actions"><button class="btn-primary" onclick="copyOutput()">📋 复制当前内容</button><button class="btn-secondary" onclick="resetAll()">🔄 重置</button><span class="status" id="status"></span></div>
</div>
<script>
var mode='md';var src=document.getElementById('source');var preview=document.getElementById('preview');
function switchMode(){mode=document.getElementById('mode').value;document.getElementById('tb-md').style.display=mode==='md'?'flex':'none';document.getElementById('tb-html').style.display=mode==='html'?'flex':'none';document.getElementById('mode-badge').textContent=mode==='md'?'Markdown':'HTML';updatePreview()}
function insertAt(m,prefix,suffix){var p=src.selectionStart;var v=src.value;src.value=v.substring(0,p)+prefix+suffix+v.substring(p);src.focus();src.setSelectionRange(p+prefix.length,p+prefix.length);updatePreview()}
function wrapSel(m,before,after,placeholder){var p1=src.selectionStart,p2=src.selectionEnd;var v=src.value,sel=v.substring(p1,p2)||placeholder;src.value=v.substring(0,p1)+before+sel+after+v.substring(p2);src.focus();var pos=p1+before.length+sel.length+after.length;if(!v.substring(p1,p2))pos=p1+before.length;src.setSelectionRange(pos,pos);updatePreview()}
function renderMD(md){var h=md.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');h=h.replace(/&gt; \[!(\w+)\]\s*(.*?)(\n|$)((?:&gt;.*(?:\n|$))*)/gm,function(_,t,title,nl,body){var b=body.replace(/^&gt; ?/gm,'').replace(/\n$/,'');return '<div class="callout '+t+'"><div class="callout-title">'+title+'</div><div>'+b+'</div></div>'});h=h.replace(/```(\w*)\n([\s\S]*?)```/g,'<pre><code>$2</code></pre>');h=h.replace(/`([^`]+)`/g,'<code>$1</code>');h=h.replace(/^### (.+)$/gm,'<h3>$1</h3>');h=h.replace(/^## (.+)$/gm,'<h2>$1</h2>');h=h.replace(/^# (.+)$/gm,'<h1>$1</h1>');h=h.replace(/\*\*(.+?)\*\*/g,'<b>$1</b>');h=h.replace(/\*(.+?)\*/g,'<i>$1</i>');h=h.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img src="$2" alt="$1">');h=h.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2">$1</a>');h=h.replace(/^---$/gm,'<hr>');h=h.replace(/^- (.+)$/gm,'<li>$1</li>');h=h.replace(/((?:<li>.*<\/li>\n?)+)/g,'<ul>$1</ul>');var lines=h.split('\n');var inTable=false,tableHtml='',headerDone=false;for(var i=0;i<lines.length;i++){var l=lines[i].trim();if(/^\|.+\|$/.test(l)){if(/^\|[-:\s|]+\|$/.test(l)){headerDone=true;continue}if(!inTable){inTable=true;tableHtml='<table>'}var cells=l.split('|').filter(function(c){return c.trim()});var tag=(!headerDone&&i>0&&lines[i-1]&&/^\|[-:\s|]+\|$/.test(lines[i-1].trim()))?'th':'td';tableHtml+='<tr>'+cells.map(function(c){return '<'+tag+'>'+c.trim()+'</'+tag+'>'}).join('')+'</tr>'}else{if(inTable){tableHtml+='</table>';lines[i-1]=tableHtml;inTable=false;tableHtml='';headerDone=false}}}if(inTable){lines[lines.length-1]=tableHtml+'</table>'}h=lines.join('\n');h=h.replace(/^(?!<[a-z/!]|&lt;)[^<\n].+$/gm,'<p>$&</p>');return h}
function updatePreview(){if(mode==='md'){preview.innerHTML=renderMD(src.value)}else{preview.innerHTML=src.value}}
src.addEventListener('input',updatePreview);
function copyOutput(){var out=mode==='md'?renderMD(src.value):src.value;navigator.clipboard.writeText(out).then(function(){document.getElementById('status').textContent='✅ 已复制到剪贴板';setTimeout(function(){document.getElementById('status').textContent=''},2000)}).catch(function(){document.getElementById('status').textContent='⚠ 复制失败，手动选择吧'})}
function resetAll(){if(confirm('确定重置？当前内容会丢失。'))location.reload()}
updatePreview();
</script>
</body>
</html>
