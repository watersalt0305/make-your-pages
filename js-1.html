<style>:root{--bg:#f8f6f3;--card:#fffefa;--border:#ddd5cb;--text:#2c2420;--text2:#6b5e54;--text3:#9a8d82;--accent:#8b5e3c;--accent2:#b07a50;--accent-bg:#f5efe8;--code-bg:#1e1e2e;--code-text:#cdd6f4;--code-border:#45475a;--font:'Inter','Noto Sans SC',-apple-system,system-ui,sans-serif;--mono:'JetBrains Mono','Fira Code','Consolas',monospace}*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.75;background-image:radial-gradient(circle,rgba(180,165,145,0.25) 1px,transparent 1px);background-size:24px 24px}.container{max-width:720px;margin:0 auto;padding:40px 24px}a{color:var(--accent);text-decoration:none}.step-num{font-size:12px;color:var(--accent2);letter-spacing:1px;font-weight:600;margin-bottom:4px}h1{font-size:24px;font-weight:700;margin-bottom:8px}.lead{font-size:15px;color:var(--text2);margin-bottom:24px}.note{background:var(--accent-bg);border-left:3px solid var(--accent);padding:12px 16px;margin:16px 0;font-size:14px;color:var(--text2)}code{font-family:var(--mono);font-size:13px;background:rgba(139,94,60,0.1);color:var(--accent);padding:2px 6px;border-radius:3px}.playground{border:1px solid var(--code-border);margin:24px 0;background:var(--card);overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.06);border-radius:8px}.playground-header{display:flex;align-items:center;padding:0 16px;height:38px;background:#2a2a3a;border-bottom:1px solid var(--code-border);font-size:12px;color:#9a8d82}.playground-header-dots{display:flex;gap:6px;margin-right:16px}.playground-header-dots span{width:10px;height:10px;border-radius:50%}.playground-header span.title{font-weight:600;flex:1}.playground-run{background:var(--accent);color:#fff;border:none;padding:4px 14px;font-size:11px;cursor:pointer;font-weight:600;border-radius:4px}.playground-body{display:flex}.playground-code{width:50%;border-right:1px solid var(--code-border)}.playground-code .CodeMirror{height:300px;font-family:var(--mono);font- <p class="step-num">JavaScript · 第 1 步</p>
<h1>按钮点击</h1>
<p class="lead">JavaScript 让页面「响应用户」。最基础的就是：点按钮，发生点什么。</p>
<div class="playground" id="pg1"><div class="playground-header"><div class="playground-header-dots"><span style="background:#ff5f56"></span><span style="background:#ffbd2e"></span><span style="background:#27c93f"></span></div><span class="title">按钮实验</span><button class="playground-run" onclick="runPlayground('pg1')">▶ 运行</button></div><div class="playground-body"><div class="playground-code"><textarea id="pg1-code">&lt;style&gt;
  body { font-family: sans-serif; padding: 20px; background: #fff; }
  button { background: #8b5e3c; color: white; border: none;
    padding: 10px 20px; font-size: 14px; cursor: pointer; margin: 4px; }
  button:hover { background: #b07a50; }
&lt;/style&gt;

&lt;h3&gt;点击按钮试试&lt;/h3&gt;

&lt;button onclick="alert('你好！')"&gt;打招呼&lt;/button&gt;
&lt;button onclick="alert('S级权限确认')"&gt;查看权限&lt;/button&gt;

&lt;script&gt;
  function sayHi() {
    alert('灯儿：实验室温度 19.7°C');
  }
&lt;/script&gt;

&lt;button onclick="sayHi()"&gt;呼叫灯儿&lt;/button&gt;</textarea></div><div class="playground-preview"><iframe id="pg1-frame"></iframe></div></div></div>
<div class="note"><code>onclick="..."</code> = 点击时执行括号里的 JS<br><code>alert('...')</code> = 弹出提示框<br>前两个直接在 onclick 里写，第三个调用了 &lt;script&gt; 里定义的函数。</div>
<h2 style="font-size:18px;margin-top:32px">发生了什么</h2>
<p>&lt;script&gt; 标签里的内容会被浏览器记住。这种模式叫<b>事件驱动</b>——你不需要写"一直等着"，只需告诉浏览器"当点击发生时，做这个"。</p>

<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.min.js"></script><script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/htmlmixed/htmlmixed.min.js"></script><script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/xml/xml.min.js"></script><script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/javascript/javascript.min.js"></script><script>var editors={};function initPG(id){var ta=document.getElementById(id+'-code');if(!ta)return;var cm=CodeMirror.fromTextArea(ta,{mode:'htmlmixed',theme:'ayu-dark',lineNumbers:true,lineWrapping:true,tabSize:2,viewportMargin:Infinity});cm.setSize('100%',300);editors[id]=cm;runPlayground(id);}function runPlayground(id){var cm=editors[id];var code=cm?cm.getValue():document.getElementById(id+'-code').value;var f=document.getElementById(id+'-frame');var p=f.parentNode;var n=document.createElement('iframe');n.id=id+'-frame';n.style.cssText='width:100%;border:none;min-height:300px';p.replaceChild(n,f);var d=n.contentDocument||n.contentWindow.document;d.open();d.write(code);d.close();}window.addEventListener('load',function(){initPG('pg1');});</script>
