<style>:root{--bg:#f8f6f3;--card:#fffefa;--border:#ddd5cb;--text:#2c2420;--text2:#6b5e54;--text3:#9a8d82;--accent:#8b5e3c;--accent2:#b07a50;--accent-bg:#f5efe8;--code-bg:#1e1e2e;--code-text:#cdd6f4;--code-border:#45475a;--font:'Inter','Noto Sans SC',-apple-system,system-ui,sans-serif;--mono:'JetBrains Mono','Fira Code','Consolas',monospace}*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.75;background-image:radial-gradient(circle,rgba(180,165,145,0.25) 1px,transparent 1px);background-size:24px 24px}.container{max-width:720px;margin:0 auto;padding:40px 24px}a{color:var(--accent);text-decoration:none}.step-num{font-size:12px;color:var(--accent2);letter-spacing:1px;font-weight:600;margin-bottom:4px}h1{font-size:24px;font-weight:700;margin-bottom:8px}.lead{font-size:15px;color:var(--text2);margin-bottom:24px}.note{background:var(--accent-bg);border-left:3px solid var(--accent);padding:12px 16px;margin:16px 0;font-size:14px;color:var(--text2)}code{font-family:var(--mono);font-size:13px;background:rgba(139,94,60,0.1);color:var(--accent);padding:2px 6px;border-radius:3px}.playground{border:1px solid var(--code-border);margin:24px 0;background:var(--card);overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.06);border-radius:8px}.playground-header{display:flex;align-items:center;padding:0 16px;height:38px;background:#2a2a3a;border-bottom:1px solid var(--code-border);font-size:12px;color:#9a8d82}.playground-header-dots{display:flex;gap:6px;margin-right:16px}.playground-header-dots span{width:10px;height:10px;border-radius:50%}.playground-header span.title{font-weight:600;flex:1}.playground-run{background:var(--accent);color:#fff;border:none;padding:4px 14px;font-size:11px;cursor:pointer;font-weight:600;border-radius:4px}.playground-body{display:flex}.playground-code{width:50%;border-right:1px solid var(--code-border)}.playground-code .CodeMirror{height:400px;font-family:var(--mono);font- <p class="step-num">JavaScript · 第 3 步</p>
<h1>切换显示/隐藏</h1>
<p class="lead">OC 站最常见的交互：点一下展开详细信息，再点一下收起。</p>
<div class="playground" id="pg1"><div class="playground-header"><div class="playground-header-dots"><span style="background:#ff5f56"></span><span style="background:#ffbd2e"></span><span style="background:#27c93f"></span></div><span class="title">档案面板</span><button class="playground-run" onclick="runPlayground('pg1')">▶ 运行</button></div><div class="playground-body"><div class="playground-code"><textarea id="pg1-code">&lt;style&gt;
  body { font-family: sans-serif; padding: 20px; background: #fff; }
  .panel { border: 1px solid #ddd; padding: 16px; max-width: 300px; }
  .panel h3 { margin-bottom: 8px; color: #8b5e3c; }
  button { background: #8b5e3c; color: white; border: none;
    padding: 6px 16px; cursor: pointer; font-size: 13px; margin: 4px; }
  button:hover { background: #b07a50; }
  #detail { display: none; margin-top: 12px; color: #6b5e54;
    font-size: 13px; border-top: 1px solid #eee; padding-top: 12px; }
&lt;/style&gt;

&lt;div class="panel"&gt;
  &lt;h3&gt;灯儿 · 研究员档案&lt;/h3&gt;
  &lt;p&gt;STEM 首席&lt;/p&gt;

  &lt;button onclick="toggleDetail()"&gt;展开详情&lt;/button&gt;

  &lt;div id="detail"&gt;
    &lt;p&gt;编号：R-0042&lt;/p&gt;
    &lt;p&gt;部门：碎片科学研究所&lt;/p&gt;
    &lt;p&gt;权限等级：S&lt;/p&gt;
    &lt;p&gt;备注：不要碰她的咖啡。&lt;/p&gt;
  &lt;/div&gt;
&lt;/div&gt;

&lt;script&gt;
  function toggleDetail() {
    var detail = document.getElementById('detail');
    if (detail.style.display === 'block') {
      detail.style.display = 'none';
    } else {
      detail.style.display = 'block';
    }
  }
&lt;/script&gt;</textarea></div><div class="playground-preview"><iframe id="pg1-frame"></iframe></div></div></div>
<div class="note"><code>display: none</code> = 隐藏 | <code>display: block</code> = 显示<br><code>if (条件) { ... } else { ... }</code> = 如果...就...否则...</div>
<h2 style="font-size:18px;margin-top:32px">你学会了</h2>
<p>✅ onclick 响应点击 ✅ getElementById 找到元素 ✅ textContent 改文字 ✅ display 切换显隐 ✅ if/else 做开关</p>

<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.min.js"></script><script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/htmlmixed/htmlmixed.min.js"></script><script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/xml/xml.min.js"></script><script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/javascript/javascript.min.js"></script><script>var editors={};function initPG(id){var ta=document.getElementById(id+'-code');if(!ta)return;var cm=CodeMirror.fromTextArea(ta,{mode:'htmlmixed',theme:'ayu-dark',lineNumbers:true,lineWrapping:true,tabSize:2,viewportMargin:Infinity});cm.setSize('100%',400);editors[id]=cm;runPlayground(id);}function runPlayground(id){var cm=editors[id];var code=cm?cm.getValue():document.getElementById(id+'-code').value;var f=document.getElementById(id+'-frame');var p=f.parentNode;var n=document.createElement('iframe');n.id=id+'-frame';n.style.cssText='width:100%;border:none;min-height:400px';p.replaceChild(n,f);var d=n.contentDocument||n.contentWindow.document;d.open();d.write(code);d.close();}window.addEventListener('load',function(){initPG('pg1');});</script>
